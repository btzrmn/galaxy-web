<section class="about-section section">
  <div class="container">
    <div class="about-grid">
      <!-- Image side -->
      <div class="about-image reveal-left">
        <div class="about-img-wrapper">
          <div class="about-img-glow"></div>
          <img [src]="content2.filePath" alt="Next Galaxy" class="about-img" *ngIf="content2.filePath">
        </div>
      </div>

      <!-- Content side -->
      <div class="about-content reveal-right">
        <!-- <span class="section-label">Бидний тухай</span> -->
        <h2 class="section-title">{{ content2.name }}</h2>
        <div class="about-desc" [innerHTML]="content2.info"></div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number">{{ countValue?.customers || 0 }}</div>
            <div class="stat-label">Харилцагчид</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">{{ countValue?.months || 0 }}</div>
            <div class="stat-label">Дууны бүлэг</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">{{ countValue?.songs || 0 }}</div>
            <div class="stat-label">Дуу</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
