<div id="contact" class="contact-us section">
  <div class="container">
    <div class="demos" id="demos">
      <div class="col-lg-6 offset-lg-3">
        <div class="section-heading wow fadeIn" data-wow-duration="1s" data-wow-delay="0.5s">
          <!-- <h6>Бидэнтэй холбогдох</h6> -->
          <h4>Бидэнтэй <em>холбогдох</em></h4>
          <div class="line-dec"></div>
        </div>
      </div>
      <div class="col-lg-12 wow fadeInUp" data-wow-duration="0.5s" data-wow-delay="0.25s">
        <form id="contact" action="" method="post">
          <div class="row">
            <!-- <div class="col-lg-12">
              <div class="contact-dec">
                <img src="assets/images/contact-dec-v2.png" alt="">
              </div>
            </div> -->
            <div class="col-lg-5">
              <div id="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1081.0200052821215!2d106.90373752955377!3d47.91256823421643!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5d969307171d7c6f%3A0x27dcabcf8f7c02a1!2sNext%20Galaxy%20production!5e1!3m2!1sen!2smn!4v1744473013900!5m2!1sen!2smn"
                  width="100%" height="636px" frameborder="0" style="border:0" allowfullscreen></iframe>
              </div>
            </div>
            <div class="col-lg-7">
              <div class="fill-form">
                <form [formGroup]="contactForm">
                  <div class="row">
                    <div class="col-lg-6">
                      <fieldset>
                        <input type="text" formControlName="name" placeholder="Нэр"
                          [ngClass]="{ 'is-invalid': submitted && f['name'].errors }">
                        <div *ngIf="submitted && f['name'].errors" class="invalid-feedback">
                          <div *ngIf="f['name'].errors['required']">Нэр оруулна уу</div>
                          <div *ngIf="f['name'].errors['minlength']">Нэр хэт богино байна</div>
                        </div>
                      </fieldset>
                      <fieldset>
                        <input type="text" formControlName="phoneNumber" placeholder="Холбогдох утасны дугаар"
                          [ngClass]="{ 'is-invalid': submitted && f['phoneNumber'].errors }">
                        <div *ngIf="submitted && f['phoneNumber'].errors" class="invalid-feedback">
                          <div *ngIf="f['phoneNumber'].errors['required']">Утасны дугаар оруулна уу</div>
                          <div *ngIf="f['phoneNumber'].errors['pattern']">Зөвхөн 8 оронтой тоо оруулна уу</div>
                        </div>
                      </fieldset>
                    </div>
                    <div class="col-lg-6">
                      <fieldset>
                        <textarea formControlName="description" class="form-control" placeholder="Агуулга"
                          [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>
                        <div *ngIf="submitted && f['description'].errors" class="invalid-feedback">
                          <div *ngIf="f['description'].errors['required']">Агуулга оруулна уу</div>
                          <div *ngIf="f['description'].errors['minlength']">Агуулга хэт богино байна</div>
                        </div>
                      </fieldset>
                    </div>
                    <div class="col-lg-12" style="margin-bottom: 30px;">
                      <fieldset>
                        <button class="main-button" (click)="onSubmit()">
                          Санал, хүсэлт илгээх
                        </button>
                      </fieldset>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="row" style="margin-top: 50px;">
        <div class="col-lg-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.3s">
          <div class="news-posts">
            <div class="row">
              <div class="col-lg-6" *ngFor="let item of employees" style="margin-bottom: 20px;">
                <div class="post-item">
                  <div class="thumb">
                    <img [src]="item.filePath ? item.filePath : 'assets/images/profile.webp'" class="image-size"
                      [alt]="formatName(item.lastName, item.firstName)">
                  </div>
                  <div class="right-content">
                    <a [href]="item.socialAddress" target="_blank">
                      <p>{{formatName(item.lastName, item.firstName)}}</p>
                    </a>
                    <p>{{item.description}}</p>
                    <div class="contact-details">
                      <p><i class="fa fa-envelope"></i> {{item.email}}</p>
                      <p><i class="fa fa-phone"></i> {{item.phoneNumber}}</p>
                    </div>
                    <!-- <span class="date">{{item.createdDate | date: 'yyyy-MM-dd HH:mm'}}</span> -->
                    <!-- <div class="border-first-button" style="text-align: right;"><a href="#">Дэлгэрэнгүй</a></div> -->
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
