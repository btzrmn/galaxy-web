<section class="services-section section">
  <div class="container">
    <!-- Heading -->
    <div class="services-header reveal">
      <span class="section-label">Каталог</span>
      <h2 class="section-title">Бүтээгдэхүүн</h2>
      <p class="section-desc">Тоглуулагчаас эхлэн дагалдах хэрэгсэл хүртэл бүх зүйлийг нэг дороос авах боломжтой</p>
    </div>

    <!-- Product Tabs -->
    <div class="product-tabs reveal">
      <div
        *ngFor="let item of contents; let i = index"
        class="product-tab"
        [class.active]="activeTypeCode === item.typeCode"
        (click)="setActive(i, item.typeCode)"
      >
        <img [src]="item.icon" [alt]="item.title">
        <span>{{ item.title }}</span>
      </div>
    </div>

    <!-- Product Content -->
    <div class="product-content-area">
      <div
        *ngFor="let item of contents; let i = index"
        class="product-panel"
        [class.active]="activeIndex === i"
      >
        <div class="product-panel-inner">
          <div class="product-info reveal-left">
            <span class="section-label">{{ item.title }}</span>
            <h3 class="product-title">{{ item.title }}</h3>
            <div class="product-desc" [innerHTML]="item.info"></div>
            <a [routerLink]="['/product', i + 1]" class="btn btn-primary">
              Дэлгэрэнгүй үзэх
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
          <div class="product-image reveal-right">
            <img [src]="item.image" [alt]="item.title" *ngIf="item.image">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
