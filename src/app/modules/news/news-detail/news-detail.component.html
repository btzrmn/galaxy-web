<div id="news" class="news-detail">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 show-up wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.3s">
        <div class="news-post">
          <div class="thumb">
            <div class="video-container">
              <div *ngIf="!news.fileImage">
                <video controls style="width: 100%; height: 100%;">
                  <source [src]="news.filePath" type="video/mp4" />
                </video>
              </div>
              <div *ngIf="news.fileImage">
                <a><img [src]="news.filePath" alt=""></a>
              </div>
            </div>
          </div>
          <div class="down-content">
            <span class="category">Мэдээ</span>
            <span class="date">{{news.createdDate | date: 'yyyy-MM-dd HH:mm'}}</span>
            <a>
              <h4>{{news.name}}</h4>
            </a>
            <p [innerHTML]="news.content"></p>
            <span class="author"><img src="assets/images/only-logo.png" alt="">Next Galaxy</span>
            <div class="border-first-button"><a routerLink="/news">Бусад мэдээллүүд</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
