<div class="page-wrapper">
  <div class="page-hero">
    <div class="container">
      <span class="section-label">{{ content.typeName }}</span>
      <h1 class="page-title">{{ content.name }}</h1>
    </div>
  </div>

  <div class="container">
    <div class="product-detail-wrapper">
      <!-- Image -->
      <div class="product-detail-img reveal-left">
        <img [src]="content.filePath" [alt]="content.name" class="detail-img-full">
      </div>

      <!-- Info -->
      <div class="product-detail-info reveal-right glass-card">
        <div class="product-detail-meta">
          <span class="badge badge-primary">{{ content.typeName }}</span>
          <span class="detail-date">{{ content.createdDate | date: 'yyyy-MM-dd' }}</span>
        </div>
        <h2 class="product-detail-name">{{ content.name }}</h2>
        <div class="product-detail-desc" [innerHTML]="content.info"></div>

        <div class="product-detail-author">
          <img src="assets/images/only-logo.png" alt="Next Galaxy" class="author-logo">
          <span>Next Galaxy</span>
        </div>
      </div>
    </div>
  </div>
</div>
