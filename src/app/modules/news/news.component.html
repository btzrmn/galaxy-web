<div class="page-wrapper">
  <!-- Page Hero -->
  <div class="page-hero">
    <div class="container">
      <span class="section-label">Мэдээ мэдээлэл</span>
      <h1 class="page-title">Мэдээлэл <span class="gradient-text">Зөвлөгөө</span></h1>
    </div>
  </div>

  <div class="container">
    <div class="news-grid">
      <article class="news-card reveal" *ngFor="let item of news">
        <a [routerLink]="item.id" class="news-card-link">
          <!-- Media -->
          <div class="card-image">
            <div *ngIf="item.fileImage" class="card-img-wrap">
              <img [src]="item.filePath" [alt]="item.name" loading="lazy">
            </div>
            <div *ngIf="!item.fileImage" class="card-video-wrap">
              <video>
                <source [src]="item.filePath" type="video/mp4">
              </video>
              <div class="play-overlay">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="card-body">
            <div class="card-meta">
              <span class="badge badge-primary">Мэдээ</span>
              <span class="card-date">{{ item.createdDate | date: 'yyyy-MM-dd' }}</span>
            </div>
            <h2 class="card-title">{{ item.name }}</h2>
            <p class="card-desc" [innerHTML]="item.content | slice:0:200"></p>
            <div class="card-action">
              Дэлгэрэнгүй унших
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </div>
        </a>
      </article>
    </div>
  </div>
</div>
