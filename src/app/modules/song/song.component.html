<div class="page-wrapper">
  <!-- Hero -->
  <div class="page-hero">
    <div class="container">
      <span class="section-label">Next Galaxy</span>
      <h1 class="page-title">Дууны <span class="gradient-text">сан</span></h1>
      <p class="page-subtitle">Karaoke-д зориулсан манай бүрэн дууны сан</p>
    </div>
  </div>

  <div class="container">
    <!-- Search & Filter Toolbar -->
    <div class="song-toolbar">
      <!-- Search Input -->
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          class="form-control search-input"
          [placeholder]="searchInLyrics ? 'Дууны үгнээс хайх...' : 'Дууны нэр, дуучин хайх...'"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchInput()"
        >
      </div>

      <!-- Genre Filter -->
      <div class="genre-wrap" *ngIf="genres.length > 0">
        <select class="genre-select" [(ngModel)]="selectedGenreId" (change)="onGenreChange()">
          <option [ngValue]="null">Бүх жанр</option>
          <option *ngFor="let g of genres" [ngValue]="g.id">{{ g.name }}</option>
        </select>
      </div>

      <!-- Lyrics Toggle -->
      <label class="lyrics-toggle">
        <input type="checkbox" [(ngModel)]="searchInLyrics" (change)="onSearchModeChange()">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label-text">Дууны үгнээс хайх</span>
      </label>
    </div>

    <!-- Loading -->
    <div class="song-loading" *ngIf="loading">
      <div class="spinner"></div>
    </div>

    <!-- Song Table -->
    <div class="song-table-wrap fade-in" *ngIf="!loading && songs.length > 0">
      <table class="song-table">
        <thead>
          <tr>
            <th class="col-code">Код</th>
            <th class="col-name">Дууны нэр</th>
            <th class="col-artist">Дуучин / Хамтлаг</th>
            <th class="col-genre">Жанр</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let song of songs"
            class="song-row"
            (click)="openDetail(song.id)"
            role="button"
            tabindex="0"
            (keydown.enter)="openDetail(song.id)"
          >
            <td class="song-code-cell">
              <span class="code-badge">{{ song.code }}</span>
            </td>
            <td class="song-name-cell">
              <div class="song-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M9 18V5l12-2v13"/>
                  <circle cx="6" cy="18" r="3"/>
                  <circle cx="18" cy="16" r="3"/>
                </svg>
              </div>
              <span>{{ song.name }}</span>
            </td>
            <td class="song-artist-cell">{{ song.artistName || song.artist || '—' }}</td>
            <td>
              <span class="genre-badge" *ngIf="song.genreName">{{ song.genreName }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div class="empty-state fade-in" *ngIf="!loading && songs.length === 0">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <h3>Дуу олдсонгүй</h3>
      <p>Хайлтын нөхцлөө өөрчилж дахин оролдоно уу</p>
    </div>
  </div>
</div>
