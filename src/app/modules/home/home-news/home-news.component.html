<section class="news-section section">
  <div class="container">
    <!-- Heading -->
    <div class="news-header reveal">
      <span class="section-label">Мэдээ мэдээлэл</span>
      <h2 class="section-title">Мэдээ мэдээлэл</h2>
    </div>

    <!-- Main + Sidebar layout -->
    <div class="news-layout">
      <!-- Featured news -->
      <div class="news-featured reveal-left" *ngIf="parentNews">
        <a [routerLink]="'/news/' + parentNews.id" class="featured-card glass-card">
          <div class="featured-media">
            <div *ngIf="parentNews.fileImage" class="featured-img-wrap">
              <img [src]="parentNews.filePath" alt="" class="featured-img">
            </div>
            <div *ngIf="!parentNews.fileImage" class="featured-video-wrap">
              <video [src]="parentNews.filePath" class="featured-video"></video>
              <div class="play-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="featured-body">
            <div class="news-meta">
              <span class="badge badge-primary">Мэдээ</span>
              <span class="news-date">{{ parentNews.createdDate | date: 'yyyy-MM-dd' }}</span>
            </div>
            <h3 class="featured-title">{{ parentNews.name }}</h3>
            <span class="read-more">
              Дэлгэрэнгүй унших
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </span>
          </div>
        </a>
      </div>

      <!-- News list -->
      <div class="news-list">
        <div class="news-item reveal" *ngFor="let item of news">
          <a [routerLink]="'/news/' + item.id" class="news-item-card glass-card">
            <div class="news-item-media">
              <img *ngIf="item.fileImage" [src]="item.filePath" alt="" class="news-item-img">
              <div *ngIf="!item.fileImage" class="news-item-video">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </div>
            </div>
            <div class="news-item-body">
              <span class="news-date">{{ item.createdDate | date: 'yyyy-MM-dd' }}</span>
              <h4 class="news-item-title">{{ item.name }}</h4>
              <p class="news-item-desc" [innerHTML]="item.content | slice:0:140"></p>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- View all -->
    <div class="news-footer reveal">
      <a routerLink="/news" class="btn btn-outline">
        Бүх мэдээ үзэх
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
</section>
