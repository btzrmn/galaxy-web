<section class="hero bg-animated">
  <!-- Background decorations -->
  <div class="hero-bg-orb hero-orb-1"></div>
  <div class="hero-bg-orb hero-orb-2"></div>

  <div class="container">
    <div class="hero-inner">
      <!-- Text content -->
      <div class="hero-text reveal-left">
        <div class="hero-badge">
          <span class="badge badge-primary">Next Galaxy</span>
        </div>
        <h1 class="hero-title">{{ content1.name }}</h1>
        <div class="hero-desc" [innerHTML]="content1.info"></div>
        <div class="hero-actions">
          <a [routerLink]="['/product', 1]" class="btn btn-primary">
            Бүтээгдэхүүн үзэх
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
          <a routerLink="/about-us" class="btn btn-outline">Бидний тухай</a>
        </div>
      </div>

      <!-- Hero image -->
      <div class="hero-visual reveal-right">
        <div class="hero-image-wrapper">
          <div class="hero-image-glow"></div>
          <img [src]="content1.filePath" alt="Next Galaxy" class="hero-img" *ngIf="content1.filePath">
        </div>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator">
      <div class="scroll-dot"></div>
    </div>
  </div>
</section>
