<div class="page-wrapper">
  <!-- Page Hero -->
  <div class="page-hero">
    <div class="container">
      <span class="section-label">Бүтээгдэхүүн</span>
      <h1 class="page-title">
        <span class="gradient-text">{{ contents[0] ? contents[0].typeName : 'Бүтээгдэхүүн' }}</span>
      </h1>
    </div>
  </div>

  <div class="container">
    <div class="products-grid">
      <article class="product-item glass-card reveal" *ngFor="let item of contents">
        <a [routerLink]="item.id" class="product-item-link">
          <div class="product-img-wrap">
            <img [src]="item.filePath" [alt]="item.name" loading="lazy" class="product-img">
            <div class="product-overlay">
              <span class="view-btn">Дэлгэрэнгүй</span>
            </div>
          </div>
          <div class="product-body">
            <span class="product-category">{{ item.typeName }}</span>
            <h3 class="product-name">{{ item.name }}</h3>
            <p class="product-info" [innerHTML]="item.info | slice:0:120"></p>
          </div>
        </a>
      </article>
    </div>
  </div>
</div>
